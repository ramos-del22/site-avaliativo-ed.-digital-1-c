<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guerra Fria</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Guerra Fria</h1>

  <nav>
    <a href="#timeline">Timeline</a>
    <a href="#eventos">Eventos</a>
    <a href="#lideres">Líderes</a>
  </nav>

  <div class="controls">
    <button onclick="increaseFont()">A+</button>
    <button onclick="decreaseFont()">A-</button>
    <button onclick="toggleContrast()">Contraste</button>
  </div>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <h2>Capitalismo vs Socialismo</h2>
  <p>Uma disputa global sem confronto direto</p>
</section>

<!-- TIMELINE -->
<section id="timeline" class="section">
  <h2>Linha do Tempo</h2>
  <div id="timeline-container"></div>
</section>

<!-- FILTRO -->
<section class="section">
  <h2>Filtrar Eventos</h2>
  <select id="filter" onchange="filterEvents()">
    <option value="all">Todos</option>
    <option value="militar">Militar</option>
    <option value="politico">Político</option>
    <option value="tecnologico">Tecnológico</option>
  </select>
</section>

<!-- EVENTOS -->
<section id="eventos" class="section">
  <h2>Eventos</h2>
  <div id="event-container" class="grid"></div>
</section>

<!-- CARROSSEL -->
<section class="section">
  <h2>Galeria</h2>
  <div class="carousel">
    <button onclick="prevSlide()">◀</button>
    <div id="carousel-track" class="carousel-track"></div>
    <button onclick="nextSlide()">▶</button>
  </div>
</section>

<!-- ACORDEÃO -->
<section id="lideres" class="section">
  <h2>Líderes</h2>
  <div id="accordion"></div>
</section>

</main>

<footer>
  <p>Projeto Educacional</p>
</footer>

<script src="script.js"></script>
</body>
</html>
